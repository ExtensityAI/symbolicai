[pytest]
testpaths = tests
# NOTE: --import-mode=importlib lets sibling test files share a basename
# (e.g. tests/engines/{embedding,search}/test_gemini_engine.py) without the
# "import file mismatch" error of the default prepend mode.
addopts = -v -rpP --import-mode=importlib --ignore=tests/test_imports.py --deselect=tests/engines/neurosymbolic/test_nesy_engine.py::test_token_truncator
asyncio_mode = auto
markers =
    mandatory: tests that must pass
